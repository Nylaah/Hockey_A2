<html>
<head>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  width: 100%;
  min-height: 100vh;
  background: linear-gradient(135deg, #0a1428 0%, #1a2b4a 50%, #051e3e 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Arial', sans-serif;
  position: relative;
  overflow: hidden;
}

.ice-effect {
  position: absolute;
  width: 100%;
  height: 100%;
  top: 0;
  left: 0;
  background-image: 
    radial-gradient(circle at 20% 50%, rgba(255, 255, 255, 0.05) 0%, transparent 50%),
    radial-gradient(circle at 80% 80%, rgba(59, 130, 246, 0.05) 0%, transparent 50%);
  pointer-events: none;
}

.menu-container {
  position: relative;
  z-index: 10;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 60px;
  padding: 40px;
}

.game-title {
  font-size: 72px;
  font-weight: 900;
  color: #ffffff;
  text-transform: uppercase;
  letter-spacing: 8px;
  text-shadow: 
    0 4px 20px rgba(59, 130, 246, 0.6),
    0 0 40px rgba(59, 130, 246, 0.3);
  animation: glow 3s ease-in-out infinite;
  margin-bottom: 20px;
}

.subtitle {
  font-size: 18px;
  color: #93c5fd;
  letter-spacing: 3px;
  text-transform: uppercase;
  font-weight: 300;
}

.puck {
  width: 60px;
  height: 8px;
  background: #000;
  border-radius: 4px;
  margin: 0 auto 30px;
  box-shadow: 0 0 15px rgba(59, 130, 246, 0.5);
  animation: float 2s ease-in-out infinite;
}

.play-button {
  width: 200px;
  height: 80px;
  background: linear-gradient(135deg, #3b82f6 0%, #1e40af 100%);
  border: 3px solid #60a5fa;
  border-radius: 12px;
  font-size: 28px;
  font-weight: bold;
  color: #ffffff;
  cursor: pointer;
  text-transform: uppercase;
  letter-spacing: 3px;
  transition: all 0.3s ease;
  box-shadow: 
    0 0 30px rgba(59, 130, 246, 0.5),
    inset 0 0 20px rgba(255, 255, 255, 0.1);
  position: relative;
  overflow: hidden;
}

.play-button::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
  transition: left 0.5s;
}

.play-button:hover {
  transform: scale(1.1);
  box-shadow: 
    0 0 50px rgba(59, 130, 246, 0.8),
    inset 0 0 30px rgba(255, 255, 255, 0.2);
  border-color: #93c5fd;
}

.play-button:hover::before {
  left: 100%;
}

.play-button:active {
  transform: scale(0.95);
}

@keyframes glow {
  0%, 100% {
    text-shadow: 
      0 4px 20px rgba(59, 130, 246, 0.6),
      0 0 40px rgba(59, 130, 246, 0.3);
  }
  50% {
    text-shadow: 
      0 4px 30px rgba(59, 130, 246, 0.8),
      0 0 60px rgba(59, 130, 246, 0.5);
  }
}

@keyframes float {
  0%, 100% {
    transform: translateY(0px);
  }
  50% {
    transform: translateY(-10px);
  }
}

.decorative-line {
  width: 80px;
  height: 2px;
  background: linear-gradient(90deg, transparent, #3b82f6, transparent);
  position: absolute;
}

.line-top {
  top: 30%;
  left: 5%;
  width: 150px;
}

.line-bottom {
  bottom: 20%;
  right: 5%;
  width: 200px;
}
</style>
</head>
<body>
<div class="ice-effect"></div>

<div class="decorative-line line-top"></div>
<div class="decorative-line line-bottom"></div>

<div class="menu-container">
  <div>
    <div class="puck"></div>
    <h1 class="game-title">Puck Master</h1>
    <p class="subtitle">Rule the Ice</p>
  </div>
  
  <button class="play-button" onclick="document.body.style.opacity='0.7'; setTimeout(() => alert('Jeu lancé ! 🏒'), 500);">
    PLAY
  </button>
</div>

</body>
</html>
